<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARMS Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #050505;
  --bg2: #0a0a0c;
  --bg3: #121216;
  
  --surf: rgba(255, 255, 255, 0.02);
  --surf2: rgba(255, 255, 255, 0.04);
  
  --bdr: rgba(255, 255, 255, 0.06);
  --bdr2: rgba(255, 255, 255, 0.12);
  
  --cyan: #22d3ee;
  --violet: #a78bfa;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  
  --txt: #ffffff;
  --txt2: #a1a1aa;
  --txt3: #52525b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { 
  font-family: 'Outfit', sans-serif; 
  background: var(--bg); 
  color: var(--txt); 
  min-height: 100vh; 
  overflow-x: hidden; 
}

/* Background Radial Glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top center, rgba(255,255,255,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  padding-bottom: 120px;
}

/* Typography */
h1, h2, h3, .serif {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  letter-spacing: -0.02em;
}
.mono {
  font-family: 'JetBrains Mono', monospace;
}

/* Floating Navigation */
.floating-nav {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(13, 13, 17, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--bdr2);
  border-radius: 100px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 999;
  box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 100px;
  color: var(--txt2);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.nav-item:hover, .nav-item.active {
  background: rgba(255, 255, 255, 0.08);
  color: var(--txt);
}
.nav-search {
  background: transparent;
  border: none;
  outline: none;
  color: var(--txt);
  font-family: 'Outfit', sans-serif;
  width: 140px;
  font-size: 14px;
  transition: width 0.3s;
}
.nav-search:focus {
  width: 200px;
}
.nav-search::placeholder {
  color: var(--txt3);
}

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  text-align: center;
  gap: 24px;
}
.empty-state .serif {
  font-size: 64px;
  color: var(--txt);
}
.empty-state p {
  font-size: 18px;
  color: var(--txt2);
  font-weight: 300;
  max-width: 400px;
}

/* Hero Section */
.hero {
  padding: 120px 0 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.hero-tag {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--bdr);
  padding: 6px 16px;
  border-radius: 100px;
  font-size: 12px;
  color: var(--txt2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.hero-title {
  font-size: 80px;
  line-height: 1.1;
  color: var(--txt);
  margin-bottom: 16px;
}
.hero-subtitle {
  font-size: 20px;
  color: var(--txt2);
  font-weight: 300;
  max-width: 600px;
  margin: 0 auto 40px;
}
.hero-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.stat-pill {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  padding: 16px 32px;
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  transition: all 0.3s;
}
.stat-pill:hover {
  background: var(--surf2);
  transform: translateY(-2px);
  border-color: var(--bdr2);
}
.stat-val {
  font-size: 32px;
  color: var(--txt);
}
.stat-lbl {
  font-size: 12px;
  color: var(--txt3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Charts Grid */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 60px;
}
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
}
.bento-card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 32px;
  padding: 32px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}
.bento-card:hover {
  border-color: var(--bdr2);
  background: rgba(255,255,255,0.02);
}
.bento-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}
.bento-card:hover::before { opacity: 1; }
.card-header {
  margin-bottom: 24px;
}
.card-title {
  font-size: 24px;
  color: var(--txt);
  margin-bottom: 4px;
}
.card-sub {
  font-size: 14px;
  color: var(--txt3);
  font-weight: 300;
}

/* Projects/Courses Grid */
.section-title {
  font-size: 48px;
  text-align: center;
  margin-bottom: 48px;
}
.courses-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 60px;
}
@media (max-width: 1024px) { .courses-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .courses-grid { grid-template-columns: 1fr; } }

.course-card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 24px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  cursor: pointer;
  position: relative;
}
.course-card:hover {
  transform: translateY(-4px);
  border-color: var(--bdr2);
  box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
}
.cc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.cc-code {
  font-size: 12px;
  color: var(--txt2);
  background: var(--surf);
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid var(--bdr);
}
.cc-grade {
  font-size: 14px;
  font-weight: 500;
}
.cc-name {
  font-size: 18px;
  font-weight: 400;
  color: var(--txt);
  line-height: 1.3;
  flex: 1;
}
.cc-bottom {
  margin-top: auto;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.cc-marks {
  font-size: 24px;
  color: var(--txt);
}
.cc-marks span {
  font-size: 14px;
  color: var(--txt3);
}

.bd-panel {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--bdr);
}
.bd-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--txt2);
  margin-bottom: 8px;
}
.bd-row span:last-child {
  color: var(--txt);
}

/* Search Dropdown */
.search-res-container {
  position: absolute;
  bottom: calc(100% + 16px);
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  background: rgba(13, 13, 17, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--bdr2);
  border-radius: 24px;
  padding: 8px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8);
  display: none;
  max-height: 400px;
  overflow-y: auto;
}
.sres-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.sres-item:hover {
  background: rgba(255,255,255,0.05);
}
.sres-name { font-size: 14px; color: var(--txt); }
.sres-reg { font-size: 12px; color: var(--txt3); }

/* Login Modal */
.login-overlay {
  position: fixed; inset: 0; background: var(--bg); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  width: 100%; max-width: 400px;
  background: var(--bg2); border: 1px solid var(--bdr);
  border-radius: 32px; padding: 48px 32px;
  display: flex; flex-direction: column; align-items: center;
}
.login-title { font-size: 40px; color: var(--txt); margin-bottom: 8px; }
.login-sub { font-size: 14px; color: var(--txt3); margin-bottom: 40px; text-align: center; }
.login-field { width: 100%; margin-bottom: 16px; }
.login-field input {
  width: 100%; background: var(--bg); border: 1px solid var(--bdr);
  border-radius: 16px; padding: 16px; color: var(--txt); font-size: 15px;
  font-family: 'Outfit', sans-serif; transition: all 0.3s;
}
.login-field input:focus { border-color: rgba(255,255,255,0.3); outline: none; }
.login-btn {
  width: 100%; background: #fff; color: #000; border: none;
  border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 500;
  cursor: pointer; margin-top: 16px; transition: all 0.3s;
  font-family: 'Outfit', sans-serif;
}
.login-btn:hover { background: #e2e8f0; transform: translateY(-2px); }
.login-err { color: #f87171; font-size: 13px; margin-top: 16px; text-align: center; display: none;}
</style>
</head>
<body>

<div class="app">

  <div class="container" id="mainContainer">
    <!-- Initial Empty State -->
    <div class="empty-state">
      <div class="serif">ARMS Portfolio</div>
      <p>Search for a student using the floating navigation bar below to view their beautifully crafted academic portfolio.</p>
    </div>
  </div>

  <!-- Floating Nav -->
  <div class="floating-nav">
    <div class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" class="nav-search" id="searchInput" placeholder="Search Reg No or Name..." autocomplete="off">
    </div>
    <div class="nav-item" id="logoutBtn" style="display:none;" onclick="logout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      Logout
    </div>
    
    <div class="search-res-container" id="searchDrop"></div>
  </div>

</div>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-title serif">ARMS</div>
    <div class="login-sub">Sign in to view academic records</div>
    
    <div class="login-field">
      <input id="loginReg" type="text" placeholder="Registration Number" autocomplete="off"/>
    </div>
    <div class="login-field">
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"/>
    </div>
    
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<script>
const API = window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1' ? 'http://127.0.0.1:5000' : '';

let _loggedInReg = sessionStorage.getItem('arms_reg');
let _searchTimeout = null;

Chart.defaults.color = '#71717a';
Chart.defaults.font.family = 'Outfit';

// INIT
window.onload = () => {
  if (_loggedInReg && sessionStorage.getItem('arms_token')) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'flex';
    // Auto-load profile on page refresh (will handle 401 gracefully)
    loadStudent(_loggedInReg);
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
  }
};

function authHeaders() {
  return {'X-Session-Token': sessionStorage.getItem('arms_token')};
}

function logout() {
  sessionStorage.clear();
  _loggedInReg = null;
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('mainContainer').innerHTML = `
    <div class="empty-state">
      <div class="serif">ARMS Portfolio</div>
      <p>Search for a student using the floating navigation bar below to view their beautifully crafted academic portfolio.</p>
    </div>`;
}

// LOGIN
async function doLogin() {
  const reg = document.getElementById('loginReg').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  
  if (!reg || !pass) { err.textContent = 'Please enter both fields.'; err.style.display = 'block'; return; }
  
  btn.textContent = 'Signing in...'; btn.disabled = true; err.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/login`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({reg_no: reg, password: pass})
    });
    const data = await res.json();
    if (data.success) {
      sessionStorage.setItem('arms_reg', data.reg_no);
      sessionStorage.setItem('arms_token', data.token);
      _loggedInReg = data.reg_no;
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'flex';
      // Load current user profile immediately
      loadStudent(data.reg_no);
    } else {
      err.textContent = data.error || 'Login failed'; err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Server error.'; err.style.display = 'block';
  }
  btn.textContent = 'Sign In'; btn.disabled = false;
}

// SEARCH
const sInput = document.getElementById('searchInput');
const sDrop = document.getElementById('searchDrop');

sInput.addEventListener('input', (e) => {
  clearTimeout(_searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 3) { sDrop.style.display = 'none'; return; }
  
  _searchTimeout = setTimeout(async () => {
    try {
      const res = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`, {headers: authHeaders()});
      if (!res.ok) return;
      const data = await res.json();
      if (data.results && data.results.length) {
        sDrop.innerHTML = data.results.map(r => `
          <div class="sres-item" onclick="loadStudent('${r.reg_no}'); sInput.value=''; sDrop.style.display='none';" style="display:flex; align-items:center; gap: 12px; padding: 8px 12px;">
            <img src="${API}${r.photo}" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(r.name || r.reg_no)}&background=111&color=fff&size=40';" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #111;">
            <div style="flex:1">
              <div class="sres-name">${r.name || 'Unknown'}</div>
              <div class="sres-reg mono">${r.reg_no}</div>
            </div>
          </div>
        `).join('');
        sDrop.style.display = 'block';
      } else {
        sDrop.innerHTML = `<div style="padding:16px;color:var(--txt3);text-align:center;font-size:14px;">No results found</div>`;
        sDrop.style.display = 'block';
      }
    } catch(err) {}
  }, 400);
});

// LOAD DATA
async function loadStudent(regNo) {
  const container = document.getElementById('mainContainer');
  container.innerHTML = `
    <div class="empty-state">
      <div class="spinner" style="width:40px;height:40px;border:2px solid var(--bdr);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;"></div>
      <p>Crafting portfolio...</p>
    </div>`;
    
  try {
    const res = await fetch(`${API}/api/student/${encodeURIComponent(regNo)}`, {headers: authHeaders()});
    if (res.status === 401) {
      // Session expired (Render restarted) — force re-login
      sessionStorage.clear();
      _loggedInReg = null;
      document.getElementById('loginOverlay').style.display = 'flex';
      document.getElementById('logoutBtn').style.display = 'none';
      container.innerHTML = `
        <div class="empty-state">
          <div class="serif">Session Expired</div>
          <p>Please log in again to continue.</p>
        </div>`;
      return;
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    renderPortfolio(data);
  } catch (err) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="serif" style="color:var(--red);">Error</div>
        <p>${err.message}</p>
      </div>`;
  }
}

// RENDER
function renderPortfolio(d) {
  const p = d.profile || {};
  const reversedSems = [...(d.semesters||[])].reverse();
  const allCourses = reversedSems.flatMap(s => s.courses);
  
  // CALCULATE CGPA & ARREARS
  let arrearCount = 0;
  let gpSum = 0;
  let gpCount = 0;
  const gradePoints = {'S':10, 'A':9, 'B':8, 'C':7, 'D':6, 'E':5};
  let courseStatus = {}; 
  if (d.semesters) {
      [...(d.semesters)].forEach(s => {
          if(!s.courses) return;
          s.courses.forEach(c => {
             const code = c.CourseCode;
             const grade = c.FinalGrade;
             if (grade === 'F' || grade === 'FAIL' || grade === 'U' || grade === 'I' || grade === 'W') {
                courseStatus[code] = 'F';
             } else if (gradePoints[grade]) {
                courseStatus[code] = grade;
             }
          });
      });
  }
  Object.values(courseStatus).forEach(grade => {
      if (grade === 'F') { arrearCount++; } 
      else if (gradePoints[grade]) { gpSum += gradePoints[grade]; gpCount++; }
  });
  let calculatedCgpa = gpCount > 0 ? (gpSum / gpCount).toFixed(2) : 'N/A';

  let html = `
    <!-- HERO -->
    <div class="hero">
      <div class="hero-tag mono">Student Portfolio</div>
      <img src="${API}${p.photo}" 
           onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.name || d.reg_no)}&background=111&color=fff&size=120&font-size=0.33';"
           style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom: 20px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(255,255,255,0.05);"
           alt="Profile Photo">
      <div class="hero-title serif">${p.name || d.reg_no}</div>
      <div class="hero-subtitle">Pursuing ${p.program || 'Engineering'} at Saveetha School of Engineering.</div>
      
      <div class="hero-stats">
        <div class="stat-pill">
          <div class="stat-val mono">${calculatedCgpa}</div>
          <div class="stat-lbl">CGPA</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val mono">${arrearCount}</div>
          <div class="stat-lbl">Arrears</div>
        </div>
        <div class="stat-pill">
          <div class="stat-val mono">${allCourses.length || 0}</div>
          <div class="stat-lbl">Subjects</div>
        </div>
      </div>
    </div>
    
    <!-- CHARTS BENTO -->
    <div class="charts-grid">
      <div class="bento-card">
        <div class="card-header">
          <div class="card-title serif">Academic Trajectory</div>
          <div class="card-sub">Recent performance across semesters</div>
        </div>
        <div style="position:relative;height:240px"><canvas id="barChart"></canvas></div>
      </div>
      <div class="bento-card">
        <div class="card-header">
          <div class="card-title serif">Grade Distribution</div>
          <div class="card-sub">Overall performance breakdown</div>
        </div>
        <div style="position:relative;height:240px;display:flex;align-items:center;justify-content:center"><canvas id="pieChart"></canvas></div>
      </div>
    </div>

    <!-- STUDENT DETAILS BENTO -->
    <div class="bento-card" style="margin-top: 16px;">
      <div class="card-header">
        <div class="card-title serif">Student Details</div>
        <div class="card-sub">Personal and contact information</div>
      </div>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 16px;">
        <div>
          <div style="color:var(--txt3); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Email</div>
          <div style="color:var(--txt1); font-size:14px;">${p.email || 'N/A'}</div>
        </div>
        <div>
          <div style="color:var(--txt3); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Mobile</div>
          <div style="color:var(--txt1); font-size:14px; font-family:'JetBrains Mono', monospace;">${p.mobile || 'N/A'}</div>
        </div>
        <div>
          <div style="color:var(--txt3); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Date of Birth</div>
          <div style="color:var(--txt1); font-size:14px; font-family:'JetBrains Mono', monospace;">${p.dob || 'N/A'}</div>
        </div>
        <div>
          <div style="color:var(--txt3); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Group / Section</div>
          <div style="color:var(--txt1); font-size:14px;">${p.section || 'N/A'}</div>
        </div>
        <div>
          <div style="color:var(--txt3); font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Admission Year</div>
          <div style="color:var(--txt1); font-size:14px;">${p.years || 'N/A'}</div>
        </div>
      </div>
    </div>
    
    <!-- COURSES MASONRY -->
    <div class="section-title serif">Academic History</div>
    <div class="courses-grid">
      ${allCourses.map((c, i) => buildCourseCard(c, i, d.reg_no)).join('')}
    </div>
  `;
  
  document.getElementById('mainContainer').innerHTML = html;
  
  renderCharts(d.semesters);
}

function buildCourseCard(c, i, regNo) {
  const scored = c.FinalConsolidatedMark || 0;
  const grade = c.FinalGrade || '?';
  const isFail = c.FinalResult === 'FAIL';
  
  const gradeColor = isFail ? 'var(--red)' : 
                     (grade==='O'||grade==='A+') ? 'var(--txt)' : 
                     'var(--txt2)';
                     
  return `
    <div class="course-card" onclick="toggleBD('bd-${i}', '${regNo}', '${c.CourseCode}', '${c.MonthValue}', '${c.YearValue}')">
      <div class="cc-top">
        <div class="cc-code mono">${c.CourseCode || '—'}</div>
        <div class="cc-grade mono" style="color:${gradeColor}">${grade}</div>
      </div>
      <div class="cc-name">${c.CourseName || '—'}</div>
      <div class="cc-bottom">
        <div class="cc-marks mono">${scored}<span>/500</span></div>
      </div>
      <div class="bd-panel" id="bd-${i}">
        <div class="bd-row"><span>Result Date</span><span class="mono">${c.MonthYearValue||'—'}</span></div>
      </div>
    </div>
  `;
}

function toggleBD(id, regNo, code, month, year) {
  const pnl = document.getElementById(id);
  if (!pnl) return;
  if (pnl.style.display === 'block') {
    pnl.style.display = 'none';
    return;
  }
  
  pnl.style.display = 'block';
  if (!pnl.dataset.fetched && regNo && code && month && year) {
    pnl.dataset.fetched = "true";
    pnl.insertAdjacentHTML('beforeend', `<div id="fetch-${id}" style="color:var(--txt3);font-size:12px;margin-top:8px;text-align:center;">Fetching breakdown...</div>`);
    
    fetch(`${API}/api/student/${regNo}/breakdown?course_code=${code}&month=${month}&year=${year}`, {headers: authHeaders()})
      .then(r => r.json())
      .then(d => {
        document.getElementById(`fetch-${id}`)?.remove();
        if(d.success && d.data) {
          const m = d.data;
          pnl.insertAdjacentHTML('beforeend', `
            <div class="bd-row" style="margin-top:8px"><span>Formative Total</span><span class="mono">${m['Formative Total']||'0'}</span></div>
            <div class="bd-row"><span>Summative Total</span><span class="mono">${m['Sumative Total']||'0'}</span></div>
            <div class="bd-row"><span>Theory Converted</span><span class="mono">${m['Theory Converted Mark']||'0'}</span></div>
          `);
        } else {
          pnl.insertAdjacentHTML('beforeend', `<div style="color:var(--txt3);font-size:12px;margin-top:8px;text-align:center;">Breakdown unavailable</div>`);
        }
      }).catch(e => {
        document.getElementById(`fetch-${id}`)?.remove();
      });
  }
}

function renderCharts(semesters) {
  if (!semesters || !semesters.length) return;
  const recent = [...semesters].slice(0,8).reverse();
  const labels = recent.map(s => (s.semester || s.sem_name || '').substring(0,8));
  const barData = recent.map(s => s.total_marks || 0);
  const barMax = recent.map(s => s.max_marks || 500);
  
  const barColors = barData.map((v,i) => {
    const p = barMax[i] ? (v/barMax[i]*100) : 0;
    return p>=80?'rgba(255,255,255,0.8)':p>=60?'rgba(255,255,255,0.4)':p>=40?'rgba(255,255,255,0.1)':'rgba(248,113,113,0.8)';
  });

  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {label:'Marks Scored', data:barData, backgroundColor:barColors, borderRadius:8, borderSkipped:false},
        {label:'Max (500)', data:barMax, backgroundColor:'rgba(255,255,255,0.03)', borderRadius:8, borderSkipped:false}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{grid:{color:'rgba(255,255,255,0.05)'}, beginAtZero:true},
        x:{grid:{display:false}}
      }
    }
  });

  const allCourses = semesters.flatMap(s=>s.courses);
  const gmap = {'S':0,'A':0,'B':0,'C':0,'D':0,'E':0,'F':0};
  allCourses.forEach(c => { if(c.FinalGrade && gmap[c.FinalGrade]!==undefined) gmap[c.FinalGrade]++; });
  
  const gLbls = Object.keys(gmap).filter(g=>gmap[g]>0);
  const gData = gLbls.map(g=>gmap[g]);
  const gColors={'S':'#ffffff','A':'rgba(255,255,255,0.8)','B':'rgba(255,255,255,0.6)','C':'rgba(255,255,255,0.4)','D':'rgba(255,255,255,0.2)','E':'rgba(255,255,255,0.1)','F':'#dc2626'};

  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data:{labels:gLbls,datasets:[{data:gData,backgroundColor:gLbls.map(g=>gColors[g]),borderColor:'#121216',borderWidth:2}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'75%',
      plugins:{legend:{position:'right',labels:{color:'#a1a1aa'}}}
    }
  });
}
</script>
</body>
</html>
